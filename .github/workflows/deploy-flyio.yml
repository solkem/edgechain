name: Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy app to Fly.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.0'

      - name: Disable Corepack and install Yarn from GitHub
        run: |
          # Disable Corepack to prevent it from intercepting yarn commands
          corepack disable

          echo "Downloading Yarn 4.9.2 from GitHub releases..."
          mkdir -p ~/.yarn/berry
          curl -L https://github.com/yarnpkg/berry/raw/%40yarnpkg/cli/4.9.2/packages/yarnpkg-cli/bin/yarn.js -o ~/.yarn/berry/yarn.js
          chmod +x ~/.yarn/berry/yarn.js

          # Create a wrapper script that bypasses Corepack
          sudo tee /usr/local/bin/yarn > /dev/null << 'EOFWRAPPER'
          #!/bin/bash
          exec node "$HOME/.yarn/berry/yarn.js" "$@"
          EOFWRAPPER
          sudo chmod +x /usr/local/bin/yarn

          # Verify installation
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check CompactC toolchain (if available)
        run: |
          if command -v compactc >/dev/null 2>&1; then
            node scripts/check-toolchain.mjs
          else
            echo "::warning::compactc not found on runner; skipping CompactC toolchain check for Fly deploy."
          fi

      - name: Build UI package
        run: yarn workspace @edgechain/web build
        env:
          NODE_ENV: production
          # Deployed contract address (set in GitHub Secrets)
          # To set: GitHub -> Settings -> Secrets and variables -> Actions -> New repository secret
          # Name: VITE_CONTRACT_ADDRESS
          # Value: 02002f44e466b8c8a1422e269156a6bb4e098cde1007203adf7181eb6659211dbe39
          VITE_CONTRACT_ADDRESS: ${{ secrets.VITE_CONTRACT_ADDRESS }}
          VITE_MIDNIGHT_INDEXER_URL: https://indexer.testnet-02.midnight.network/api/v1/graphql
          VITE_MIDNIGHT_INDEXER_WS: wss://indexer.testnet-02.midnight.network/api/v1/graphql/ws
          VITE_MIDNIGHT_NODE_URL: https://rpc.testnet-02.midnight.network
          VITE_API_URL: https://edgechain-midnight.fly.dev
          VITE_AGENT_ENABLED: 'true'
          VITE_VIRTUAL_NDANI_ENABLED: 'true'
          VITE_VIRTUAL_NDANI_COORDINATOR_ENABLED: 'true'
          VITE_VIRTUAL_NDANI_PHYSICAL_BINDING_ENABLED: 'false'
          VITE_VIRTUAL_NDANI_PIPELINE_DEMO_ENABLED: 'false'

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly Postgres secret
        run: |
          secrets_output="$(flyctl secrets list --app edgechain-midnight)"

          if echo "${secrets_output}" | grep -q 'DATABASE_URL'; then
            echo "DATABASE_URL is already configured on Fly."
          elif [ -n "${DATABASE_URL}" ]; then
            echo "Setting DATABASE_URL from GitHub Actions secret."
            flyctl secrets set --app edgechain-midnight DATABASE_URL="${DATABASE_URL}"
          else
            echo "::error::DATABASE_URL is not configured on Fly. Create/attach Fly Postgres with: fly postgres attach edgechain-postgres --app edgechain-midnight"
            exit 1
          fi

          if [ -n "${DATABASE_SSL}" ]; then
            flyctl secrets set --app edgechain-midnight DATABASE_SSL="${DATABASE_SSL}"
          fi

          if flyctl secrets list --app edgechain-midnight | grep -q 'Staged'; then
            echo "Deploying staged Fly secrets before app deploy."
            flyctl secrets deploy --app edgechain-midnight
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_SSL: ${{ secrets.DATABASE_SSL }}

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --yes --config ./apps/freedom-node/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
